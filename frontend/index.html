<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Eco Water Grid</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Premium glass header styling */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        /* Sidebar dropdown styling */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .profile-dropdown {
            position: relative;
        }
        .profile-dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }
        .profile-dropdown:hover .profile-dropdown-content {
            display: block;
        }
        .logout {
            color: red;
            cursor: pointer;
        }
        /* Settings panel styles */
        .settings-card {
          max-width: 420px;
          margin: 40px auto;
          background: rgba(255,255,255,0.75);
          border-radius: 18px;
          box-shadow: 0 4px 32px rgba(50,200,190,0.11);
          padding: 36px 36px 32px 36px;
        }
        .settings-group {
          margin-bottom: 22px;
          display: flex;
          gap: 22px;
        }
        .settings-group label {
          flex: 1 1 0;
        }
        .settings-banner {
          display: flex; justify-content: center;
          align-items: center;
          font-size: 1.1em;
          color: #064e3b;
          background: #cdf6ecdd;
          border-radius: 11px;
          border: 1.5px solid #7af7d2bb;
          margin-bottom: 18px;
          padding: 7px 0;
          font-weight: 600;
        }
        .settings-card input:disabled, .settings-card select:disabled { background:#eee; color:#aaa; }
        .settings-btn { margin-right:12px; }
        .settings-btn-secondary { background:#e5ebe9; color:#23967e; }
        .settings-meta { display:flex; gap:26px; margin-top:17px; color:#445; font-size:0.97em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Smart Eco Water Grid</h1>
    </div>
    <div class="sidebar">
        <div class="profile-dropdown">
            <button>Profile</button>
            <div class="profile-dropdown-content">
                <a href="#">Profile Settings</a>
                <div class="logout">Logout</div>
            </div>
        </div>
    </div>
    <!-- Settings Panel -->
    <section id="settingsSection" style="display:none;">
      <div class="settings-card glass-panel">
        <h2>Settings</h2>
        <div id="settingsGuestBanner" class="settings-banner" style="display:none;">
          <span>🔒 Settings are disabled in Guest mode.</span>
        </div>
        <form id="settingsForm" autocomplete="off">
          <div class="settings-group">
            <label>pH Min:
              <input type="number" step="0.1" min="0" max="14" id="settingPhMin" required>
            </label>
            <label>pH Max:
              <input type="number" step="0.1" min="0" max="14" id="settingPhMax" required>
            </label>
            <label>Turbidity Max (NTU):
              <input type="number" step="1" min="0" max="50" id="settingTurbidityMax" required>
            </label>
          </div>
          <div class="settings-group">
            <label>Theme:
              <select id="settingTheme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
          </div>
          <hr>
          <div class="settings-meta">
            <span><b>User:</b> <span id="settingsUserName">-</span></span>
            <span><b>Role:</b> <span id="settingsUserRole">-</span></span>
          </div>
          <div style="margin-top:24px;">
            <button type="submit" id="settingsSaveBtn" class="settings-btn">Save Settings</button>
            <button type="button" id="settingsResetBtn" class="settings-btn settings-btn-secondary">Reset to Default</button>
          </div>
        </form>
      </div>
    </section> 
    <script>
        // Add any required JavaScript here
    </script>
</body>
</html>
